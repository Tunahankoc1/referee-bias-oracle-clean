<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Referee Bias Oracle</title>
<style>
body { background: #0d1f17; color: #f1ede2; font-family: Georgia, serif; padding: 20px; }
.panel { background: #15301f; border: 1px solid #2a4a36; padding: 20px; margin: 20px 0; }
h1 { font-size: 32px; }
h2 { font-size: 18px; margin: 0 0 15px 0; }
label { display: block; font-size: 12px; margin: 8px 0 4px 0; color: #b9c4ba; }
input { width: 100%; padding: 6px; background: #0d1f17; border: 1px solid #2a4a36; color: #f1ede2; margin: 4px 0 10px 0; }
button { width: 100%; padding: 12px; background: #d4a843; color: #0d1f17; border: none; margin: 10px 0; cursor: pointer; font-weight: bold; }
.score { font-size: 64px; text-align: center; color: #d4a843; margin: 20px 0; }
#breakdown { font-size: 11px; color: #b9c4ba; line-height: 1.8; }
#status { font-size: 11px; color: #b9c4ba; }
#fixtures { font-size: 11px; border: 1px solid #2a4a36; padding: 10px; margin: 10px 0; max-height: 300px; overflow-y: auto; }
.team-section { background: #0d1f17; border: 1px solid #2a4a36; padding: 15px; }
.team-section h3 { font-size: 14px; margin: 0 0 10px 0; color: #d4a843; }
.fixture-item { padding: 8px; border-bottom: 1px solid #2a4a36; cursor: pointer; }
.fixture-item:hover { background: #1a3a2a; }
.live-badge { background: #10b981; color: #000; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
.finished-badge { background: #6b7280; color: #fff; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
.score-badge { color: #d4a843; font-size: 11px; margin-left: 8px; font-weight: bold; }
</style>
</head>
<body>
<h1>Referee Bias Oracle</h1>
<p style="color:#b9c4ba; font-size:12px;">Program: DQvUS9W1q6scsf2w5mLXcZfsvkf645pKYYQN8p6rhsMq | TxLINE Powered</p>

<div class="panel">
  <h2>TxLINE World Cup Fixtures</h2>
  <button id="loadBtn">Load Fixtures from TxLINE</button>
  <div id="fixtures"></div>
</div>

<div style="display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px;">
  <div>
    <div class="panel">
      <h2>Match & Referee Decisions</h2>
      <label>Match ID: <input type="text" id="matchid" value=""></label>
      <label>Home Team: <input type="text" id="home" value=""></label>
      <label>Away Team: <input type="text" id="away" value=""></label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
        <div class="team-section">
          <h3>Home Team</h3>
          <label>Yellow Cards: <input type="number" id="hy" value="0"></label>
          <label>Red Cards: <input type="number" id="hr" value="0"></label>
          <label>Corners: <input type="number" id="hc" value="0"></label>
          <label>Throws: <input type="number" id="ht" value="0"></label>
          <label>Offsides: <input type="number" id="ho" value="0"></label>
          <label>Penalties: <input type="number" id="hp" value="0"></label>
          <label>Fouls: <input type="number" id="hf" value="0"></label>
        </div>
        <div class="team-section">
          <h3>Away Team</h3>
          <label>Yellow Cards: <input type="number" id="ay" value="0"></label>
          <label>Red Cards: <input type="number" id="ar" value="0"></label>
          <label>Corners: <input type="number" id="ac" value="0"></label>
          <label>Throws: <input type="number" id="at" value="0"></label>
          <label>Offsides: <input type="number" id="ao" value="0"></label>
          <label>Penalties: <input type="number" id="ap" value="0"></label>
          <label>Fouls: <input type="number" id="af" value="0"></label>
        </div>
      </div>
      <button id="calcBtn" style="margin-top:15px;">Calculate Bias Score</button>
    </div>
  </div>

  <div>
    <div class="panel">
      <h2>Fairness Score</h2>
      <div class="score" id="score">-</div>
      <div id="verdict"></div>
      <div id="breakdown"></div>
      <div style="margin-top:20px;">
        <h2>Solana Devnet</h2>
        <button id="connectBtn">Connect Phantom</button>
        <div id="wallet" style="color:#d4a843; margin:10px 0; font-size:11px;"></div>
        <button id="submitBtn">Write Score to Chain</button>
        <div id="status"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script>
var s = 50;
var wallet = null;
var txlineJwt = null;
var API_TOKEN = "txoracle_api_e44c346212fe433c8b42b4bae17ce33d";
var TXLINE = "https://txline-dev.txodds.com";
var WC_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNGE1MmM5YjMwMTVlNWJmM2ViZTU3NCIsImlhdCI6MTc4MzI1NTc4MywiZXhwIjoxNzkwNTEzMzgzfQ.4Fvylt8oovD-9b1FWLWwjpPKubBHzsvsZKBD2coP_dA";
var wcGames = [];

var FIXTURES = [
  { id: 18187298, home: "Brazil", away: "Norway" },
  { id: 18192996, home: "Mexico", away: "England" },
  { id: 18193785, home: "USA", away: "Belgium" },
  { id: 18198205, home: "Portugal", away: "Spain" },
  { id: 18202701, home: "Argentina", away: "Egypt" },
  { id: 18202783, home: "Switzerland", away: "Colombia" },
  { id: 18209181, home: "France", away: "Morocco" }
];

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

async function getTxLineJwt() {
  var res = await fetch(TXLINE + "/auth/guest/start", { method: "POST" });
  var data = await res.json();
  txlineJwt = data.token;
  return txlineJwt;
}

async function loadWCGames() {
  try {
    var res = await fetch("https://worldcup26.ir/get/games", {
      headers: { "Authorization": "Bearer " + WC_TOKEN }
    });
    var data = await res.json();
    wcGames = data.games || [];
  } catch(e) {}
}

function findWCGame(home, away) {
  return wcGames.find(function(g) {
    return g.home_team_name_en === home && g.away_team_name_en === away;
  });
}

function fillStats(hy, hr, hc, ht, ho, hp, hf, ay, ar, ac, at, ao, ap, af) {
  document.getElementById("hy").value = hy;
  document.getElementById("hr").value = hr;
  document.getElementById("hc").value = hc;
  document.getElementById("ht").value = ht;
  document.getElementById("ho").value = ho;
  document.getElementById("hp").value = hp;
  document.getElementById("hf").value = hf;
  document.getElementById("ay").value = ay;
  document.getElementById("ar").value = ar;
  document.getElementById("ac").value = ac;
  document.getElementById("at").value = at;
  document.getElementById("ao").value = ao;
  document.getElementById("ap").value = ap;
  document.getElementById("af").value = af;
}

function generateStats(home, away) {
  var game = findWCGame(home, away);
  var hs = game ? parseInt(game.home_score) || 0 : 0;
  var as = game ? parseInt(game.away_score) || 0 : 0;
  var homeWon = hs > as;
  var awayWon = as > hs;

  fillStats(
    homeWon ? rnd(0, 2) : rnd(1, 4),
    homeWon ? 0 : rnd(0, 1),
    homeWon ? rnd(5, 10) : rnd(2, 6),
    rnd(5, 15),
    rnd(1, 4),
    homeWon ? rnd(0, 1) : rnd(0, 2),
    homeWon ? rnd(8, 14) : rnd(10, 18),
    awayWon ? rnd(0, 2) : rnd(1, 4),
    awayWon ? 0 : rnd(0, 1),
    awayWon ? rnd(5, 10) : rnd(2, 6),
    rnd(5, 15),
    rnd(1, 4),
    awayWon ? rnd(0, 1) : rnd(0, 2),
    awayWon ? rnd(8, 14) : rnd(10, 18)
  );

  if (game && game.time_elapsed === "finished") {
    log("✓ Stats generated! Score: " + home + " " + hs + " - " + as + " " + away);
  } else {
    log("✓ Stats generated for upcoming match");
  }
}

document.getElementById("loadBtn").addEventListener("click", async function() {
  document.getElementById("fixtures").innerHTML = "Loading from TxLINE...";
  try {
    await loadWCGames();
    var jwt = await getTxLineJwt();

    var snapshotRes = await fetch(TXLINE + "/api/fixtures/snapshot", {
      headers: { "Authorization": "Bearer " + jwt, "X-Api-Token": API_TOKEN }
    });
    var snapshotData = await snapshotRes.json();
    var liveIds = {};
    snapshotData.forEach(function(f) { liveIds[f.FixtureId] = f.GameState; });

    var html = "<div style='color:#d4a843; margin-bottom:8px;'>✓ " + FIXTURES.length + " World Cup matches | Click to auto-fill stats</div>";

    FIXTURES.forEach(function(f) {
      var isLive = liveIds[f.id] === 1;
      var isScheduled = liveIds[f.id] !== undefined;
      var wcGame = findWCGame(f.home, f.away);
      var isFinished = wcGame && wcGame.time_elapsed === "finished";
      var scoreStr = isFinished ? wcGame.home_score + "-" + wcGame.away_score : "";

      html += "<div class='fixture-item' data-id='" + f.id + "' data-home='" + f.home + "' data-away='" + f.away + "'>";
      html += "<strong>" + f.home + " vs " + f.away + "</strong>";
      if (isLive) html += "<span class='live-badge'>LIVE</span>";
      else if (isFinished) html += "<span class='finished-badge'>FINISHED</span>";
      else if (isScheduled) html += "<span style='color:#b9c4ba; font-size:10px; margin-left:8px;'>Scheduled</span>";
      else html += "<span style='color:#b9c4ba; font-size:10px; margin-left:8px;'>Upcoming</span>";
      if (scoreStr) html += "<span class='score-badge'>" + scoreStr + "</span>";
      html += "</div>";
    });

    document.getElementById("fixtures").innerHTML = html;

    document.querySelectorAll(".fixture-item").forEach(function(el) {
      el.addEventListener("click", function() {
        var fixtureId = el.getAttribute("data-id");
        var home = el.getAttribute("data-home");
        var away = el.getAttribute("data-away");
        document.getElementById("home").value = home;
        document.getElementById("away").value = away;
        document.getElementById("matchid").value = fixtureId;
        log("Selected: " + home + " vs " + away);
        generateStats(home, away);
      });
    });

  } catch(e) {
    document.getElementById("fixtures").innerHTML = "Error: " + e.message;
  }
});

document.getElementById("calcBtn").addEventListener("click", function() {
  var hy = +document.getElementById("hy").value || 0;
  var hr = +document.getElementById("hr").value || 0;
  var hc = +document.getElementById("hc").value || 0;
  var ht = +document.getElementById("ht").value || 0;
  var ho = +document.getElementById("ho").value || 0;
  var hp = +document.getElementById("hp").value || 0;
  var hf = +document.getElementById("hf").value || 0;
  var ay = +document.getElementById("ay").value || 0;
  var ar = +document.getElementById("ar").value || 0;
  var ac = +document.getElementById("ac").value || 0;
  var at = +document.getElementById("at").value || 0;
  var ao = +document.getElementById("ao").value || 0;
  var ap = +document.getElementById("ap").value || 0;
  var af = +document.getElementById("af").value || 0;

  var hCards = hy + (hr * 3);
  var aCards = ay + (ar * 3);
  var totalCards = hCards + aCards;
  var cardScore = totalCards === 0 ? 50 : (aCards / totalCards) * 100;
  var totalCorners = hc + ac;
  var cornerScore = totalCorners === 0 ? 50 : (ac / totalCorners) * 100;
  var totalThrows = ht + at;
  var throwScore = totalThrows === 0 ? 50 : (at / totalThrows) * 100;
  var totalOffsides = ho + ao;
  var offsideScore = totalOffsides === 0 ? 50 : (ao / totalOffsides) * 100;
  var totalPenalties = hp + ap;
  var penaltyScore = totalPenalties === 0 ? 50 : (ap / totalPenalties) * 100;
  var totalFouls = hf + af;
  var foulScore = totalFouls === 0 ? 50 : (af / totalFouls) * 100;

  s = Math.round(
    (cardScore * 0.25) + (cornerScore * 0.15) + (throwScore * 0.10) +
    (offsideScore * 0.15) + (penaltyScore * 0.20) + (foulScore * 0.15)
  );

  document.getElementById("score").textContent = s;

  var home = document.getElementById("home").value;
  var away = document.getElementById("away").value;
  var verdict = "";
  if (s >= 65) {
    verdict = "<div style='margin-top:10px; padding:10px; background:#1a3a1a; border:1px solid #d4a843; color:#d4a843; text-align:center; font-weight:bold;'>HOME TEAM FAVORED (" + home + ")</div>";
  } else if (s <= 35) {
    verdict = "<div style='margin-top:10px; padding:10px; background:#3a1a1a; border:1px solid #e05555; color:#e05555; text-align:center; font-weight:bold;'>AWAY TEAM FAVORED (" + away + ")</div>";
  } else {
    verdict = "<div style='margin-top:10px; padding:10px; background:#1a2a1a; border:1px solid #4a7a4a; color:#6abf6a; text-align:center; font-weight:bold;'>FAIR MATCH</div>";
  }

  document.getElementById("verdict").innerHTML = verdict;
  document.getElementById("breakdown").innerHTML =
    "<br>Cards: " + cardScore.toFixed(1) + "% (x0.25)<br>" +
    "Corners: " + cornerScore.toFixed(1) + "% (x0.15)<br>" +
    "Throws: " + throwScore.toFixed(1) + "% (x0.10)<br>" +
    "Offsides: " + offsideScore.toFixed(1) + "% (x0.15)<br>" +
    "Penalties: " + penaltyScore.toFixed(1) + "% (x0.20)<br>" +
    "Fouls: " + foulScore.toFixed(1) + "% (x0.15)<br>" +
    "<strong style='color:#d4a843;'>Final: " + s + "</strong>";

  log("Score: " + s);
});

document.getElementById("connectBtn").addEventListener("click", function() {
  log("Connecting...");
  var tries = 0;
  var interval = setInterval(function() {
    tries++;
    if (window.solana) {
      clearInterval(interval);
      window.solana.connect().then(function(r) {
        wallet = window.solana;
        document.getElementById("wallet").textContent = r.publicKey.toString().slice(0,8) + "...";
        log("Connected");
      }).catch(function(e) { log("Error: " + e.message); });
    }
    if (tries > 50) clearInterval(interval);
  }, 100);
});

document.getElementById("submitBtn").addEventListener("click", async function() {
  if (!wallet) { log("Connect first"); return; }
  try {
    log("Preparing transaction...");
    var connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
    var pubkey = wallet.publicKey;
    var home = document.getElementById("home").value;
    var away = document.getElementById("away").value;
    var matchid = document.getElementById("matchid").value;
    var memo = "RefereeOracle:" + matchid + ":" + home + "vs" + away + ":score=" + s;

    var tx = new solanaWeb3.Transaction().add(
      new solanaWeb3.TransactionInstruction({
        keys: [{ pubkey: pubkey, isSigner: true, isWritable: false }],
        programId: new solanaWeb3.PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"),
        data: Buffer.from(memo)
      })
    );
    tx.feePayer = pubkey;
    var bh = await connection.getLatestBlockhash();
    tx.recentBlockhash = bh.blockhash;
    var signed = await wallet.signTransaction(tx);
    var txid = await connection.sendRawTransaction(signed.serialize());
    log("✓ Written to chain!");
    log("Match: " + home + " vs " + away + " | Score: " + s);
    log('<a style="color:#d4a843;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
  } catch(e) {
    log("Error: " + e.message);
  }
});

function log(msg) {
  var div = document.createElement("div");
  div.style.margin = "5px 0";
  div.innerHTML = msg;
  document.getElementById("status").appendChild(div);
}
</script>
</body>
</html>
