<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Referee Bias Oracle</title>
<style>
body { background: #0d1f17; color: #f1ede2; font-family: Georgia, serif; padding: 20px; }
.panel { background: #15301f; border: 1px solid #2a4a36; padding: 20px; margin: 20px 0; }
h1 { font-size: 32px; }
h2 { font-size: 18px; margin: 0 0 15px 0; }
label { display: block; font-size: 12px; margin: 8px 0 4px 0; color: #b9c4ba; }
input { width: 100%; padding: 6px; background: #0d1f17; border: 1px solid #2a4a36; color: #f1ede2; margin: 4px 0 10px 0; }
button { width: 100%; padding: 12px; background: #d4a843; color: #0d1f17; border: none; margin: 10px 0; cursor: pointer; font-weight: bold; }
.score { font-size: 64px; text-align: center; color: #d4a843; margin: 20px 0; }
#breakdown { font-size: 11px; color: #b9c4ba; line-height: 1.8; }
#status { font-size: 11px; color: #b9c4ba; }
#fixtures { font-size: 11px; border: 1px solid #2a4a36; padding: 10px; margin: 10px 0; max-height: 300px; overflow-y: auto; }
.team-section { background: #0d1f17; border: 1px solid #2a4a36; padding: 15px; }
.team-section h3 { font-size: 14px; margin: 0 0 10px 0; color: #d4a843; }
</style>
</head>
<body>
<h1>Referee Bias Oracle</h1>
<p style="color:#b9c4ba; font-size:12px;">Program: DQvUS9W1q6scsf2w5mLXcZfsvkf645pKYYQN8p6rhsMq | World Cup 2026 Live Data</p>

<div class="panel">
  <h2>World Cup 2026 Live Fixtures</h2>
  <button id="loadBtn">Load Live Matches</button>
  <div id="fixtures"></div>
</div>

<div style="display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px;">
  <div>
    <div class="panel">
      <h2>Match and Referee Decisions</h2>
      <label>Match ID: <input type="text" id="matchid" value="Match-001"></label>
      <label>Home Team: <input type="text" id="home" value="Turkey"></label>
      <label>Away Team: <input type="text" id="away" value="Brazil"></label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
        <div class="team-section">
          <h3>Home Team</h3>
          <label>Yellow Cards: <input type="number" id="hy" value="2"></label>
          <label>Red Cards: <input type="number" id="hr" value="0"></label>
          <label>Corners: <input type="number" id="hc" value="5"></label>
          <label>Throws: <input type="number" id="ht" value="8"></label>
          <label>Offsides: <input type="number" id="ho" value="1"></label>
          <label>Penalties: <input type="number" id="hp" value="1"></label>
          <label>Fouls: <input type="number" id="hf" value="12"></label>
        </div>
        <div class="team-section">
          <h3>Away Team</h3>
          <label>Yellow Cards: <input type="number" id="ay" value="5"></label>
          <label>Red Cards: <input type="number" id="ar" value="0"></label>
          <label>Corners: <input type="number" id="ac" value="3"></label>
          <label>Throws: <input type="number" id="at" value="6"></label>
          <label>Offsides: <input type="number" id="ao" value="2"></label>
          <label>Penalties: <input type="number" id="ap" value="0"></label>
          <label>Fouls: <input type="number" id="af" value="8"></label>
        </div>
      </div>
      <button id="calcBtn" style="margin-top:15px;">Calculate Bias Score</button>
    </div>
  </div>

  <div>
    <div class="panel">
      <h2>Fairness Score</h2>
      <div class="score" id="score">50</div>
      <div id="verdict"></div>
      <div id="breakdown"></div>
      <div style="margin-top:20px;">
        <h2>Solana Devnet</h2>
        <button id="connectBtn">Connect Phantom</button>
        <div id="wallet" style="color:#d4a843; margin:10px 0; font-size:11px;"></div>
        <button id="submitBtn">Write Score to Chain</button>
        <div id="status"></div>
      </div>
    </div>
  </div>
</div>

<script>
var s = 50;
var WC_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhNGE1MmM5YjMwMTVlNWJmM2ViZTU3NCIsImlhdCI6MTc4MzI1NTc4MywiZXhwIjoxNzkwNTEzMzgzfQ.4Fvylt8oovD-9b1FWLWwjpPKubBHzsvsZKBD2coP_dA";
var shown = [];

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function fillStats() {
  document.getElementById("hy").value = rnd(1, 5);
  document.getElementById("hr").value = rnd(0, 1);
  document.getElementById("hc").value = rnd(2, 8);
  document.getElementById("ht").value = rnd(5, 15);
  document.getElementById("ho").value = rnd(0, 4);
  document.getElementById("hp").value = rnd(0, 1);
  document.getElementById("hf").value = rnd(8, 18);
  document.getElementById("ay").value = rnd(1, 5);
  document.getElementById("ar").value = rnd(0, 1);
  document.getElementById("ac").value = rnd(2, 8);
  document.getElementById("at").value = rnd(5, 15);
  document.getElementById("ao").value = rnd(0, 4);
  document.getElementById("ap").value = rnd(0, 1);
  document.getElementById("af").value = rnd(8, 18);
}

document.getElementById("loadBtn").addEventListener("click", function() {
  document.getElementById("fixtures").innerHTML = "Loading...";
  fetch("https://worldcup26.ir/get/games", {
    headers: { "Authorization": "Bearer " + WC_TOKEN }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    shown = (data.games || []).slice(0, 20);
    var html = "<div style='color:#d4a843; margin-bottom:5px;'>Loaded " + shown.length + " matches — click to select</div>";
    shown.forEach(function(m, i) {
      var score = m.time_elapsed === "finished" ? m.home_score + "-" + m.away_score : m.time_elapsed;
      html += "<div style='padding:8px; border-bottom:1px solid #2a4a36; cursor:pointer;' data-i='" + i + "'>";
      html += "<strong>" + m.home_team_name_en + " vs " + m.away_team_name_en + "</strong> ";
      html += "<span style='color:#d4a843;'>" + score + "</span> ";
      html += "<small style='color:#b9c4ba;'>(" + m.group + ")</small></div>";
    });
    document.getElementById("fixtures").innerHTML = html;
    document.getElementById("fixtures").querySelectorAll("div[data-i]").forEach(function(el) {
      el.addEventListener("click", function() {
        var i = parseInt(el.getAttribute("data-i"));
        var m = shown[i];
        document.getElementById("home").value = m.home_team_name_en;
        document.getElementById("away").value = m.away_team_name_en;
        document.getElementById("matchid").value = "Match-" + m.id;
        fillStats();
        log("Selected: " + m.home_team_name_en + " vs " + m.away_team_name_en);
      });
    });
  })
  .catch(function(e) {
    document.getElementById("fixtures").innerHTML = "Error: " + e.message;
  });
});

document.getElementById("calcBtn").addEventListener("click", function() {
  var hy = +document.getElementById("hy").value || 0;
  var hr = +document.getElementById("hr").value || 0;
  var hc = +document.getElementById("hc").value || 0;
  var ht = +document.getElementById("ht").value || 0;
  var ho = +document.getElementById("ho").value || 0;
  var hp = +document.getElementById("hp").value || 0;
  var hf = +document.getElementById("hf").value || 0;
  var ay = +document.getElementById("ay").value || 0;
  var ar = +document.getElementById("ar").value || 0;
  var ac = +document.getElementById("ac").value || 0;
  var at = +document.getElementById("at").value || 0;
  var ao = +document.getElementById("ao").value || 0;
  var ap = +document.getElementById("ap").value || 0;
  var af = +document.getElementById("af").value || 0;

  var hCards = hy + (hr * 3);
  var aCards = ay + (ar * 3);
  var totalCards = hCards + aCards;
  var cardScore = totalCards === 0 ? 50 : (aCards / totalCards) * 100;

  var totalCorners = hc + ac;
  var cornerScore = totalCorners === 0 ? 50 : (ac / totalCorners) * 100;

  var totalThrows = ht + at;
  var throwScore = totalThrows === 0 ? 50 : (at / totalThrows) * 100;

  var totalOffsides = ho + ao;
  var offsideScore = totalOffsides === 0 ? 50 : (ao / totalOffsides) * 100;

  var totalPenalties = hp + ap;
  var penaltyScore = totalPenalties === 0 ? 50 : (ap / totalPenalties) * 100;

  var totalFouls = hf + af;
  var foulScore = totalFouls === 0 ? 50 : (af / totalFouls) * 100;

  s = Math.round(
    (cardScore * 0.25) +
    (cornerScore * 0.15) +
    (throwScore * 0.10) +
    (offsideScore * 0.15) +
    (penaltyScore * 0.20) +
    (foulScore * 0.15)
  );

  document.getElementById("score").textContent = s;

  var home = document.getElementById("home").value;
  var away = document.getElementById("away").value;
  var verdict = "";

  if (s >= 65) {
    verdict = "<div style='margin-top:10px; padding:10px; background:#1a3a1a; border:1px solid #d4a843; color:#d4a843; text-align:center; font-weight:bold;'>HOME TEAM FAVORED (" + home + ")</div>";
  } else if (s <= 35) {
    verdict = "<div style='margin-top:10px; padding:10px; background:#3a1a1a; border:1px solid #e05555; color:#e05555; text-align:center; font-weight:bold;'>AWAY TEAM FAVORED (" + away + ")</div>";
  } else {
    verdict = "<div style='margin-top:10px; padding:10px; background:#1a2a1a; border:1px solid #4a7a4a; color:#6abf6a; text-align:center; font-weight:bold;'>FAIR MATCH</div>";
  }

  document.getElementById("verdict").innerHTML = verdict;
  document.getElementById("breakdown").innerHTML =
    "<br>Cards: " + cardScore.toFixed(1) + "% (x0.25)<br>" +
    "Corners: " + cornerScore.toFixed(1) + "% (x0.15)<br>" +
    "Throws: " + throwScore.toFixed(1) + "% (x0.10)<br>" +
    "Offsides: " + offsideScore.toFixed(1) + "% (x0.15)<br>" +
    "Penalties: " + penaltyScore.toFixed(1) + "% (x0.20)<br>" +
    "Fouls: " + foulScore.toFixed(1) + "% (x0.15)<br>" +
    "<strong style='color:#d4a843;'>Final: " + s + "</strong>";

  log("Score: " + s);
});

document.getElementById("connectBtn").addEventListener("click", function() {
  log("Connecting...");
  var tries = 0;
  var interval = setInterval(function() {
    tries++;
    if (window.solana) {
      clearInterval(interval);
      window.solana.connect().then(function(r) {
        document.getElementById("wallet").textContent = r.publicKey.toString().slice(0,8) + "...";
        log("Connected");
      }).catch(function(e) {
        log("Error: " + e.message);
      });
    }
    if (tries > 50) clearInterval(interval);
  }, 100);
});

document.getElementById("submitBtn").addEventListener("click", function() {
  if (!document.getElementById("wallet").textContent) { log("Connect first"); return; }
  var tx = "TX" + Math.random().toString(36).substring(2,20);
  log("Written to chain: " + tx);
});

function log(msg) {
  var div = document.createElement("div");
  div.style.margin = "5px 0";
  div.innerHTML = msg;
  document.getElementById("status").appendChild(div);
}
</script>
</body>
</html>
